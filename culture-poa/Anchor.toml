[toolchain]
anchor_version = "1.0.2"
package_manager = "npm"

[features]
resolution = true
skip-lint = false

[programs.localnet]
culture_poa = "4HwALuuryVebSQTLXpWdXeEJUhis8c5h8hLDxcLUCViG"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "npx ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[test]
startup_wait = 600000

[test.validator]
startup_wait = 600000
